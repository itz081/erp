<p-toast />

<div class="min-h-screen flex align-items-center justify-content-center p-3" style="background: radial-gradient(circle at top right, var(--p-primary-500), var(--p-primary-900));">
    <div class="card p-0 shadow-8 border-round-2xl overflow-hidden bg-white flex flex-column" style="max-width: 600px; width: 100%;">
        
        <div class="p-5 md:p-7 flex flex-column">
            <div class="text-center mb-5">
                <i class="pi pi-user-plus text-primary text-5xl mb-3"></i>
                <h2 class="text-900 text-3xl font-bold mb-2">Crear Cuenta</h2>
                <p class="text-600">Únete a nuestra plataforma segura</p>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="grid">
                
                <div class="col-12 md:col-6 flex flex-column gap-2 mb-3">
                    <label for="reg-username" class="font-semibold text-900">Usuario</label>
                    <span class="p-input-icon-left w-full">
                        <i class="pi pi-id-card z-1"></i>
                        <input id="reg-username" type="text" pInputText formControlName="username" class="w-full" placeholder="ej. usuario123" />
                    </span>
                </div>

                <div class="col-12 md:col-6 flex flex-column gap-2 mb-3">
                    <label for="reg-name" class="font-semibold text-900">Nombre Completo</label>
                    <span class="p-input-icon-left w-full">
                        <i class="pi pi-user z-1"></i>
                        <input id="reg-name" type="text" pInputText formControlName="fullName" class="w-full" placeholder="Nombre Apellido" />
                    </span>
                </div>

                <div class="col-12 md:col-6 flex flex-column gap-2 mb-3">
                    <label for="reg-email" class="font-semibold text-900">Correo Electrónico</label>
                    <span class="p-input-icon-left w-full">
                        <i class="pi pi-envelope z-1"></i>
                        <input id="reg-email" type="email" pInputText formControlName="email" class="w-full" placeholder="correo@ejemplo.com" />
                    </span>
                </div>

                <div class="col-12 md:col-6 flex flex-column gap-2 mb-3">
                    <label for="reg-phone" class="font-semibold text-900">Teléfono</label>
                    <span class="p-input-icon-left w-full">
                        <i class="pi pi-phone z-1"></i>
                        <input id="reg-phone" type="text" pInputText formControlName="phone" class="w-full" placeholder="10 dígitos" maxlength="10" />
                    </span>
                </div>

                <div class="col-12 flex flex-column gap-2 mb-3">
                    <label for="reg-address" class="font-semibold text-900">Dirección</label>
                    <span class="p-input-icon-left w-full">
                        <i class="pi pi-map-marker z-1"></i>
                        <input id="reg-address" type="text" pInputText formControlName="address" class="w-full" placeholder="Ciudad, País" />
                    </span>
                </div>

                <div class="col-12 flex flex-column gap-2 mb-3">
                    <label for="reg-birthdate" class="font-semibold text-900">Fecha de Nacimiento</label>
                    <p-datepicker id="reg-birthdate" formControlName="birthDate" [showIcon]="true" appendTo="body" styleClass="w-full" dateFormat="dd/mm/yy" placeholder="Selecciona tu fecha" />
                </div>

                <div class="col-12">
                    <p-divider align="center">
                        <span class="text-400 font-bold text-xs">SEGURIDAD</span>
                    </p-divider>
                </div>

                <div class="col-12 md:col-6 flex flex-column gap-2 mb-3">
                    <label for="reg-password" class="font-semibold text-900">Contraseña</label>
                    <p-password id="reg-password" formControlName="password" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" placeholder="Mín. 10 caracteres" />
                </div>

                <div class="col-12 md:col-6 flex flex-column gap-2 mb-3">
                    <label for="reg-confirm" class="font-semibold text-900">Confirmar</label>
                    <p-password id="reg-confirm" formControlName="confirmPassword" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" placeholder="Repite contraseña" />
                </div>

                <!-- Errores -->
                <div class="col-12 mb-2" *ngIf="registerForm.dirty || registerForm.touched">
                    <div class="p-3 bg-red-50 border-round-lg flex flex-column gap-1" *ngIf="registerForm.invalid">
                         <small class="text-red-500 font-medium" *ngIf="registerForm.get('password')?.errors?.['minlength']">• Mínimo 10 caracteres</small>
                         <small class="text-red-500 font-medium" *ngIf="registerForm.get('password')?.errors?.['noSymbol']">• Debe incluir un símbolo (!@#$...)</small>
                         <small class="text-red-500 font-medium" *ngIf="registerForm.get('birthDate')?.errors?.['underAge']">• Debes ser mayor de edad</small>
                         <small class="text-red-500 font-medium" *ngIf="registerForm.get('confirmPassword')?.hasError('mismatch')">• Las contraseñas no coinciden</small>
                    </div>
                </div>

                <div class="col-12">
                    <p-button label="Registrarme" type="submit" [loading]="loading()" [disabled]="registerForm.invalid" icon="pi pi-check" styleClass="w-full py-3" />
                </div>
            </form>

            <p class="text-600 text-center mt-4 mb-0">
                ¿Ya tienes una cuenta? 
                <a routerLink="/" class="text-primary font-bold no-underline hover:underline">Inicia sesión aquí</a>
            </p>
        </div>
    </div>
</div>
