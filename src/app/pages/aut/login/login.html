<p-toast />

<div class="min-h-screen flex align-items-center justify-content-center p-3" style="background: radial-gradient(circle at top right, var(--p-primary-500), var(--p-primary-900));">
    <div class="card p-0 shadow-8 border-round-2xl overflow-hidden bg-white flex flex-column md:flex-row" style="max-width: 900px; width: 100%;">
        
        <!-- Left Side: Visual / Welcome -->
        <div class="hidden md:flex flex-column justify-content-center align-items-center p-6 bg-primary text-white text-center w-5">
            <i class="pi pi-shield mb-4" style="font-size: 5rem;"></i>
            <h1 class="text-4xl font-bold m-0">SecureApp</h1>
            <p class="text-primary-100 mt-3 line-height-3">
                Gestión de tickets y grupos con seguridad de nivel empresarial.
            </p>
        </div>

        <!-- Right Side: Form -->
        <div class="p-5 md:p-7 w-full md:w-7 flex flex-column">
            <div class="mb-5">
                <h2 class="text-900 text-3xl font-bold mb-2">Iniciar Sesión</h2>
                <p class="text-600">Bienvenido de nuevo, por favor ingresa tus datos.</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-column gap-4">
                <div class="flex flex-column gap-2">
                    <label for="email" class="font-semibold text-900">Correo Electrónico</label>
                    <span class="p-input-icon-left w-full">
                        <i class="pi pi-envelope z-1"></i>
                        <input id="email" type="text" pInputText formControlName="email" class="w-full" placeholder="usuario@ejemplo.com" />
                    </span>
                    <small class="text-red-500" *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)">
                        <span *ngIf="loginForm.get('email')?.errors?.['required']">El correo es obligatorio</span>
                        <span *ngIf="loginForm.get('email')?.errors?.['email']">Formato inválido</span>
                    </small>
                </div>

                <div class="flex flex-column gap-2">
                    <div class="flex align-items-center justify-content-between">
                        <label for="password" class="font-semibold text-900">Contraseña</label>
                        <a class="text-primary font-bold text-sm no-underline cursor-pointer">¿Olvidaste tu contraseña?</a>
                    </div>
                    <span class="p-input-icon-left w-full">
                        <i class="pi pi-lock z-1"></i>
                        <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
                    </span>
                    <small class="text-red-500" *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)">
                        La contraseña es obligatoria
                    </small>
                </div>

                <p-button label="Ingresar al Sistema" type="submit" [loading]="loading()" icon="pi pi-arrow-right" iconPos="right" styleClass="w-full py-3 mt-2" />
                
                <div class="flex align-items-center gap-2 mt-2">
                    <p-divider class="flex-grow-1" />
                    <span class="text-400 text-sm">O TAMBIÉN</span>
                    <p-divider class="flex-grow-1" />
                </div>

                <p class="text-600 text-center m-0">
                    ¿No tienes una cuenta? 
                    <a routerLink="/auth/register" class="text-primary font-bold no-underline hover:underline">Crea una ahora</a>
                </p>
            </form>
        </div>
    </div>
</div>
