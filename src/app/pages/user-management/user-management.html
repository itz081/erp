<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="p-4">
    <div class="flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Usuarios</h2>
        <p-button label="Nuevo Usuario" icon="pi pi-user-plus" severity="success"
            (onClick)="openAddDialog()"></p-button>
    </div>

    <p-card>
        <p-table [value]="users()" [paginator]="true" [rows]="10" responsiveLayout="scroll"
            [tableStyle]="{'min-width': '70rem'}">
            <ng-template pTemplate="header">
                <tr>
                    <th class="align-bottom">Nombre</th>
                    <th class="align-bottom">Email</th>
                    <th class="text-center">Permisos de Grupo</th>
                    <th class="text-center">Permisos de Ticket</th>
                    <th class="align-bottom text-center">Acciones</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-user>
                <tr>
                    <td>{{user.fullName}}</td>
                    <td>{{user.email}}</td>
                    
                    <!-- Permisos de Grupo en Lista -->
                    <td>
                        <div class="flex flex-column gap-2 p-2">
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.groupPermissions!.canAdd" [binary]="true" (onChange)="onPermissionChange(user)" inputId="g_add_{{user.id}}"></p-checkbox>
                                <label for="g_add_{{user.id}}" class="text-xs">Crear Grupo</label>
                            </div>
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.groupPermissions!.canEdit" [binary]="true" (onChange)="onPermissionChange(user)" inputId="g_edi_{{user.id}}"></p-checkbox>
                                <label for="g_edi_{{user.id}}" class="text-xs">Editar Grupo</label>
                            </div>
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.groupPermissions!.canDelete" [binary]="true" (onChange)="onPermissionChange(user)" inputId="g_eli_{{user.id}}"></p-checkbox>
                                <label for="g_eli_{{user.id}}" class="text-xs">Eliminar Grupo</label>
                            </div>
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.groupPermissions!.canAddMember" [binary]="true" (onChange)="onPermissionChange(user)" inputId="gm_add_{{user.id}}"></p-checkbox>
                                <label for="gm_add_{{user.id}}" class="text-xs">Añadir Miembro</label>
                            </div>
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.groupPermissions!.canDeleteMember" [binary]="true" (onChange)="onPermissionChange(user)" inputId="gm_eli_{{user.id}}"></p-checkbox>
                                <label for="gm_eli_{{user.id}}" class="text-xs">Eliminar Miembro</label>
                            </div>
                        </div>
                    </td>

                    <!-- Permisos de Ticket en Lista -->
                    <td>
                        <div class="flex flex-column gap-2 p-2">
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.ticketPermissions!.canAdd" [binary]="true" (onChange)="onPermissionChange(user)" inputId="t_add_{{user.id}}"></p-checkbox>
                                <label for="t_add_{{user.id}}" class="text-xs">Crear Ticket</label>
                            </div>
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.ticketPermissions!.canEdit" [binary]="true" (onChange)="onPermissionChange(user)" inputId="t_edi_{{user.id}}"></p-checkbox>
                                <label for="t_edi_{{user.id}}" class="text-xs">Editar Ticket</label>
                            </div>
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.ticketPermissions!.canDelete" [binary]="true" (onChange)="onPermissionChange(user)" inputId="t_eli_{{user.id}}"></p-checkbox>
                                <label for="t_eli_{{user.id}}" class="text-xs">Eliminar Ticket</label>
                            </div>
                            <div class="flex align-items-center gap-2">
                                <p-checkbox [(ngModel)]="user.groupPermissions!.canComment" [binary]="true" (onChange)="onPermissionChange(user)" inputId="t_com_{{user.id}}"></p-checkbox>
                                <label for="t_com_{{user.id}}" class="text-xs">Comentar</label>
                            </div>
                        </div>
                    </td>

                    <td class="text-center">
                        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                            (onClick)="deleteUser(user)" pTooltip="Eliminar Usuario"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </p-card>
</div>

<!-- Modal Añadir Usuario -->
<p-dialog header="Crear Nuevo Usuario" [(visible)]="displayAddDialog" [modal]="true" [style]="{ width: '450px' }"
    styleClass="p-fluid">
    <ng-template pTemplate="content">
        <div class="field mb-3">
            <label for="fullName">Nombre Completo</label>
            <input pInputText id="fullName" [(ngModel)]="newUser.fullName" required placeholder="Ej: Juan Perez" />
        </div>
        <div class="field mb-3">
            <label for="username">Username</label>
            <input pInputText id="username" [(ngModel)]="newUser.username" required placeholder="Ej: juanp" />
        </div>
        <div class="field mb-3">
            <label for="email">Email</label>
            <input pInputText id="email" [(ngModel)]="newUser.email" required placeholder="Ej: juan@test.com" />
        </div>
        <div class="field mb-3">
            <label for="password">Contraseña</label>
            <input pInputText type="password" id="password" [(ngModel)]="newUser.password" required placeholder="********" />
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayAddDialog = false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" (onClick)="saveNewUser()"></p-button>
    </ng-template>
</p-dialog>
