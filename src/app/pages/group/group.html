<p-toast />
<p-confirmDialog />

<h2 class="section-header">Administración de Grupos</h2>

<p-divider />

<p-card styleClass="group-card">
    <p-toolbar styleClass="mb-4 gap-2">
        <ng-template pTemplate="left">
            <p-button severity="success" label="Nuevo Grupo" icon="pi pi-plus" (onClick)="openNew()" *ngIf="canAdd()" />
        </ng-template>
        <ng-template pTemplate="right">
            <p-tag [value]="'Total de Grupos: ' + N_get()" severity="info" />
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="groups()" [rows]="10" [paginator]="true"
        [globalFilterFields]="['nombre', 'categoria', 'nivel', 'autor']" [tableStyle]="{'min-width': '50rem'}"
        [rowHover]="true" dataKey="id">
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="id">ID <p-sortIcon field="id" /></th>
                <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre" /></th>
                <th pSortableColumn="categoria">Categoría <p-sortIcon field="categoria" /></th>
                <th pSortableColumn="nivel">Nivel <p-sortIcon field="nivel" /></th>
                <th pSortableColumn="autor">Autor <p-sortIcon field="autor" /></th>
                <th>Miembros</th>
                <th>Tickets</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-group>
            <tr>
                <td>{{group.id}}</td>
                <td>{{group.nombre}}</td>
                <td>{{group.categoria || 'N/A'}}</td>
                <td>{{group.nivel || 'N/A'}}</td>
                <td>{{group.autor || 'N/A'}}</td>
                <td>{{group.miembros.length}}</td>
                <td>{{group.tickets.length}}</td>
                <td>
                    <p-button icon="pi pi-eye" class="mr-2" rounded="true" text="true" severity="primary"
                        (onClick)="viewGroup(group)" pTooltip="Ver Detalles" />
                    <p-button icon="pi pi-pencil" class="mr-2" rounded="true" text="true" severity="info"
                        (onClick)="editGroup(group)" *ngIf="canEdit()" pTooltip="Editar" />
                    <p-button icon="pi pi-trash" severity="danger" rounded="true" text="true"
                        (onClick)="deleteGroup(group)" *ngIf="canDelete()" pTooltip="Eliminar" />
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="8">No hay grupos registrados.</td>
            </tr>
        </ng-template>
    </p-table>
</p-card>

<!-- Diálogo de Creación / Edición -->
<p-dialog [(visible)]="groupDialog" [style]="{width: '450px'}" header="Detalles del Grupo" [modal]="true"
    styleClass="p-fluid">
    <ng-template pTemplate="content">

        <div class="field mb-4">
            <label for="nombre">Nombre</label>
            <input type="text" pInputText id="nombre" [(ngModel)]="groupItem.nombre" required autofocus />
            <small class="p-error" *ngIf="submitted && !groupItem.nombre">El Nombre es requerido.</small>
        </div>

        <div class="field mb-4">
            <label for="categoria">Categoría</label>
            <p-select id="categoria" [options]="categoryOptions" [(ngModel)]="groupItem.categoria" placeholder="Seleccione Categoría"
                appendTo="body"></p-select>
        </div>

        <div class="field mb-4">
            <label for="nivel">Nivel</label>
            <p-select id="nivel" [options]="levelOptions" [(ngModel)]="groupItem.nivel" placeholder="Seleccione Nivel"
                appendTo="body"></p-select>
        </div>

        <div class="field mb-4">
            <label for="autor">Autor</label>
            <input type="text" pInputText id="autor" [(ngModel)]="groupItem.autor" placeholder="Nombre del autor" />
        </div>

    </ng-template>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" text="true" (onClick)="hideDialog()" />
        <p-button label="Guardar" icon="pi pi-check" (onClick)="saveGroup()" />
    </ng-template>
</p-dialog>
