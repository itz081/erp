<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-toolbar *ngIf="ticket()">
    <div class="p-toolbar-group-start">
        <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="goBack()"></p-button>
        <h2 class="ml-2">Ticket #{{ ticket()?.id }}: {{ ticket()?.titulo }}</h2>
    </div>
    <div class="p-toolbar-group-end gap-2">
        <p-button *ngIf="!editMode && canEdit()" label="Editar" icon="pi pi-pencil" (onClick)="toggleEdit()"></p-button>
        <p-button *ngIf="!editMode && canDelete()" label="Eliminar" icon="pi pi-trash" severity="danger"
            (onClick)="deleteTicket()"></p-button>
        <p-button *ngIf="editMode" label="Cancelar" icon="pi pi-times" severity="secondary"
            (onClick)="toggleEdit()"></p-button>
        <p-button *ngIf="editMode" label="Guardar" icon="pi pi-check" severity="success"
            (onClick)="saveChanges()"></p-button>
    </div>
</p-toolbar>

<div class="grid mt-4" *ngIf="ticket()">
    <div class="col-12 md:col-8">
        <p-fieldset legend="Detalles del Ticket">
            <form [formGroup]="ticketForm" class="flex flex-column gap-4">
                <div class="flex flex-column gap-2">
                    <label>Título</label>
                    <input pInputText formControlName="titulo" />
                </div>
                <div class="flex flex-column gap-2">
                    <label>Descripción</label>
                    <textarea pTextarea formControlName="descripcion" rows="4"></textarea>
                </div>

                <div class="grid">
                    <div class="col-12 md:col-6 flex flex-column gap-2">
                        <label>Estado</label>
                        <p-select [options]="estados" formControlName="estado"></p-select>
                    </div>
                    <div class="col-12 md:col-6 flex flex-column gap-2">
                        <label>Prioridad</label>
                        <p-select [options]="prioridades" formControlName="prioridad"></p-select>
                    </div>
                </div>

                <div class="grid">
                    <div class="col-12 md:col-6 flex flex-column gap-2">
                        <label>Asignado a</label>
                        <p-select [options]="groupMembers()" formControlName="asignadoA" optionLabel="username"
                            placeholder="Selecciona..."></p-select>
                    </div>
                    <div class="col-12 md:col-6 flex flex-column gap-2">
                        <label>Fecha Límite</label>
                        <p-datepicker formControlName="fechaLimite" dateFormat="yy-mm-dd"
                            appendTo="body"></p-datepicker>
                    </div>
                </div>
            </form>
        </p-fieldset>

        <p-fieldset legend="Comentarios" class="mt-4 block">
            <div class="flex flex-column gap-3">
                <div class="flex gap-2" *ngIf="canComment()">
                    <textarea pTextarea [(ngModel)]="newCommentText" rows="2" class="flex-grow-1"
                        placeholder="Escribe un comentario..."></textarea>
                    <p-button label="Comentar" icon="pi pi-send" (onClick)="addComment()"
                        [disabled]="!newCommentText.trim()"></p-button>
                </div>
                <div *ngIf="!canComment()" class="text-500 italic mb-2">
                    No tienes permisos para agregar comentarios.
                </div>
                <p-timeline [value]="ticket()!.comentarios" class="mt-3 w-full">
                    <ng-template pTemplate="content" let-comentario>
                        <p-card [header]="comentario.autor"
                            [subheader]="(comentario.fecha | date:'short') || undefined">
                            <p>{{comentario.texto}}</p>
                        </p-card>
                    </ng-template>
                    <ng-template pTemplate="empty">
                        <div class="text-500 text-center">No hay comentarios aún.</div>
                    </ng-template>
                </p-timeline>
            </div>
        </p-fieldset>
    </div>

    <div class="col-12 md:col-4">
        <p-card header="Información Adicional">
            <div class="flex flex-column gap-3">
                <div><strong>Fecha Creado:</strong> {{ ticket()?.fechaCreacion | date }}</div>
                <div><strong>Grupo ID:</strong> {{ ticket()?.groupId }}</div>
            </div>
        </p-card>

        <p-card header="Historial de Cambios" class="mt-4 block">
            <p-table [value]="ticket()!.historialCambios" responsiveLayout="scroll">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-historial>
                    <tr>
                        <td class="text-sm">{{historial.fecha | date:'short'}}</td>
                        <td class="text-sm">{{historial.cambio}}</td>
                    </tr>
                </ng-template>
            </p-table>
        </p-card>
    </div>
</div>
